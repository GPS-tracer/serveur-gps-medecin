<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker - Redirection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>GPS Tracker</h1>
        <p id="splash-status">Démarrage…</p>
    </div>

    <script type="module">
      const statusEl = document.getElementById("splash-status");

      async function pingHealth(maxAttempts = 25, intervalMs = 2000) {
        for (let i = 1; i <= maxAttempts; i++) {
          statusEl.textContent =
            i === 1 ? "Connexion au serveur…" : `Réveil du serveur… (${i}/${maxAttempts})`;
          try {
            const ctrl = new AbortController();
            const t    = setTimeout(() => ctrl.abort(), 12000);
            const res  = await fetch("/api/health", { cache: "no-store", signal: ctrl.signal });
            clearTimeout(t);
            if (res.ok) {
              statusEl.textContent = "Redirection…";
              window.location.replace("/dashboard/");
              return;
            }
          } catch { /* Render endormi — on réessaie */ }
          if (i < maxAttempts) await new Promise((r) => setTimeout(r, intervalMs));
        }
        statusEl.textContent = "Redirection (serveur lent)…";
        window.location.replace("/dashboard/");
      }

      pingHealth();
    </script>
</body>
</html>

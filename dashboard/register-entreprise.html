<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription Entreprise — GPS Tracker</title>
  <link rel="preload" href="register-form.css" as="style">
  <link rel="stylesheet" href="register-form.css">
</head>
<body class="register-form register-form--entreprise">

  <div class="register-form__wrap register-form__wrap--wide">

    <header class="register-form__header">
      <a href="register.html" class="register-form__back">← Retour au choix</a>
      <div class="register-form__icon" aria-hidden="true">🏢</div>
      <h1 class="register-form__title">Compte Entreprise</h1>
      <p class="register-form__subtitle">Gérez votre flotte et vos agents depuis le tableau de bord</p>
    </header>

    <div class="register-form__card">
      <form id="registerForm" class="register-form__form">

        <div class="register-form__logo-block">
          <div class="register-form__logo-wrap">
            <div id="logoPreview" class="register-form__logo-preview" role="button" tabindex="0" aria-label="Choisir un logo">
              <svg class="register-form__logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <img id="logoImage" class="register-form__logo-img hidden" alt="Logo" />
            </div>
            <input type="file" id="logoInput" accept="image/*" class="hidden" />
            <label for="logoInput" class="register-form__logo-btn" aria-label="Ajouter un logo">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
            </label>
          </div>
          <p class="register-form__logo-hint">Logo de votre société (optionnel)</p>
        </div>

        <div class="register-form__field">
          <label class="register-form__label" for="companyName">Nom de la société <span class="register-form__req">*</span></label>
          <input type="text" id="companyName" required placeholder="Ex: Transport Express SARL" class="register-form__input" />
        </div>

        <div class="register-form__field">
          <label class="register-form__label" for="sector">Secteur d'activité <span class="register-form__req">*</span></label>
          <select id="sector" required class="register-form__select">
            <option value="">Sélectionnez un secteur</option>
            <option value="moto">🏍️ Moto</option>
            <option value="voiture">🚗 Voiture</option>
            <option value="camion">🚚 Camion</option>
            <option value="scolaire">🚌 Scolaire</option>
          </select>
        </div>

        <div class="register-form__field">
          <label class="register-form__label" for="address">Adresse <span class="register-form__req">*</span></label>
          <textarea id="address" required rows="2" placeholder="Numéro, rue, ville, pays" class="register-form__textarea"></textarea>
        </div>

        <div class="register-form__field">
          <label class="register-form__label" for="email">Email professionnel <span class="register-form__req">*</span></label>
          <input type="email" id="email" required placeholder="contact@entreprise.com" class="register-form__input" />
        </div>

        <div class="register-form__field">
          <label class="register-form__label" for="password">Mot de passe <span class="register-form__req">*</span></label>
          <div class="register-form__pwd-wrap">
            <input type="password" id="password" required minlength="6" placeholder="Minimum 6 caractères" class="register-form__input" />
            <button type="button" id="togglePassword" class="register-form__pwd-toggle" aria-label="Afficher le mot de passe">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMessage" class="register-form__msg register-form__msg--error hidden" role="alert"></div>

        <button type="submit" id="submitBtn" class="register-form__submit">Créer mon compte entreprise</button>

        <p class="register-form__foot">
          Déjà un compte ? <a href="login.html">Se connecter</a>
        </p>
      </form>
    </div>

    <p class="register-form__copy">© 2026 GPS Tracker — Tous droits réservés</p>
  </div>

  <script type="module" src="register-entreprise.js"></script>
</body>
</html>

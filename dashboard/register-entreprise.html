<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription Entreprise — GPS Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl">

    <div class="text-center mb-8">
      <a href="register.html" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">← Retour au choix</a>
      <div class="text-4xl mt-4 mb-2">🏢</div>
      <h1 class="text-3xl font-bold text-white mb-1">Compte Entreprise</h1>
      <p class="text-slate-400 text-sm">Gérez votre flotte et vos agents depuis le tableau de bord</p>
    </div>

    <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700/50 p-8">
      <form id="registerForm" class="space-y-5">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
          <div class="relative">
            <div id="logoPreview"
              class="w-28 h-28 rounded-full bg-slate-700/50 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden cursor-pointer hover:border-sky-500 transition-colors">
              <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <img id="logoImage" class="hidden w-full h-full object-cover" alt="Logo" />
            </div>
            <input type="file" id="logoInput" accept="image/*" class="hidden" />
            <label for="logoInput"
              class="absolute bottom-0 right-0 bg-sky-500 hover:bg-sky-600 text-white rounded-full p-2 cursor-pointer shadow-lg transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
            </label>
          </div>
          <p class="text-slate-400 text-xs mt-2">Logo de votre société (optionnel)</p>
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Nom de la société <span class="text-red-400">*</span></label>
          <input type="text" id="companyName" required placeholder="Ex: Transport Express SARL"
            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500" />
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Secteur d'activité <span class="text-red-400">*</span></label>
          <select id="sector" required
            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-sky-500 cursor-pointer">
            <option value="" class="bg-slate-800">Sélectionnez un secteur</option>
            <option value="moto"     class="bg-slate-800">🏍️ Moto</option>
            <option value="voiture"  class="bg-slate-800">🚗 Voiture</option>
            <option value="camion"   class="bg-slate-800">🚚 Camion</option>
            <option value="scolaire" class="bg-slate-800">🚌 Scolaire</option>
          </select>
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Adresse <span class="text-red-400">*</span></label>
          <textarea id="address" required rows="2" placeholder="Numéro, rue, ville, pays"
            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 resize-none"></textarea>
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Email professionnel <span class="text-red-400">*</span></label>
          <input type="email" id="email" required placeholder="contact@entreprise.com"
            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500" />
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Mot de passe <span class="text-red-400">*</span></label>
          <div class="relative">
            <input type="password" id="password" required minlength="6" placeholder="Minimum 6 caractères"
              class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500" />
            <button type="button" id="togglePassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

        <button type="submit" id="submitBtn"
          class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-lg transition-all">
          Créer mon compte entreprise
        </button>

        <p class="text-center text-slate-400 text-sm">
          Déjà un compte ? <a href="login.html" class="text-sky-400 hover:text-sky-300 font-medium">Se connecter</a>
        </p>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">© 2026 GPS Tracker — Tous droits réservés</p>
  </div>

  <script type="module" src="register-entreprise.js"></script>
</body>
</html>

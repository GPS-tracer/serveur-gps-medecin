<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="GPS Tracker — Tableau de bord en temps réel" />
  <meta name="theme-color" content="#0f172a" />
  <title>GPS Tracker — Dashboard</title>

  <link rel="preload" href="style.css" as="style">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      const theme = localStorage.getItem('gps-tracker-theme') || 'dark';
      document.documentElement.className = 'theme-' + theme;
    })();
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <script>window.tailwind={corePlugins:{preflight:true}}</script>
  <script src="https://cdn.tailwindcss.com?plugins=forms" defer></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#060d1f',
              900: '#0b1628',
              800: '#0f1e35',
              700: '#162540',
              600: '#1e3254',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-navy-950 text-slate-100 h-screen overflow-hidden">

  <!-- ── Splash : réveil serveur puis auth ── -->
  <div id="auth-loading"
    class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-navy-950 gap-4 px-6">
    <div class="w-12 h-12 rounded-2xl bg-sky-500/20 border border-sky-500/40 flex items-center justify-center text-2xl"
      aria-hidden="true">🛰️</div>
    <div class="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"
      aria-hidden="true"></div>
    <p class="text-white text-base font-semibold tracking-wide">GPS Tracker</p>
    <p id="splash-status" class="text-slate-400 text-sm text-center max-w-xs">Démarrage…</p>
  </div>

  <!-- Overlay mobile sidebar -->
  <div id="sidebarOverlay" aria-hidden="true"></div>

  <!-- ── Dashboard principal ── -->
  <div id="dashboard-root" class="flex h-screen" hidden>

    <!-- ════════════════════════════════════════════
         SIDEBAR — Bleu nuit corporate
         ════════════════════════════════════════════ -->
    <aside class="sidebar-new flex flex-col w-64 flex-shrink-0 bg-navy-900 border-r border-navy-700 h-screen overflow-hidden">

      <!-- Logo + Nom société -->
      <div class="px-5 pt-6 pb-4 border-b border-navy-700">
        <!-- Bouton fermeture sidebar (mobile) -->
        <button id="sidebarClose"
          class="md:hidden mb-3 flex items-center gap-2 text-slate-400 hover:text-white text-xs transition-colors"
          aria-label="Fermer le menu">
          ✕ Fermer
        </button>
        <div class="flex items-center gap-3 mb-1">
          <div id="companyLogoWrap"
            class="w-9 h-9 rounded-lg bg-sky-500/20 border border-sky-500/40 flex items-center justify-center flex-shrink-0 overflow-hidden">
            <img id="companyLogoImg" class="hidden w-full h-full object-cover rounded-lg" alt="Logo" />
            <span id="companyLogoFallback" class="text-sky-400 text-lg">🛰️</span>
          </div>
          <div class="min-w-0">
            <p id="sidebarCompanyName"
              class="text-sm font-bold text-white truncate leading-tight">GPS Tracker</p>
            <p class="text-xs text-slate-500 leading-tight">Tableau de bord</p>
          </div>
        </div>

        <!-- Badge statut compte -->
        <div id="accountBadge"
          class="mt-3 flex items-center gap-2 px-3 py-1.5 rounded-lg bg-navy-800 border border-navy-600 text-xs">
          <span class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0 animate-pulse"></span>
          <span id="accountBadgeText" class="text-slate-400 truncate">Chargement…</span>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

        <!-- Carte en direct (actif par défaut) -->
        <a href="index.html"
          class="nav-item nav-item--active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="map-pin"></svg>
          <span>Carte en direct</span>
          <span id="agentCount"
            class="ml-auto text-xs font-bold px-2 py-0.5 rounded-full bg-sky-500/20 text-sky-400 border border-sky-500/30">0</span>
        </a>

        <!-- Ma Flotte -->
        <a href="fleet.html"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="users"></svg>
          <span>Ma Flotte</span>
        </a>

        <!-- Rapports & RSE -->
        <a href="rapport.html"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="bar-chart-2"></svg>
          <span>Rapports &amp; RSE</span>
        </a>

        <!-- Sécurité Anti-Vol -->
        <a href="licence.html"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="shield-check"></svg>
          <span>Licences &amp; Sécurité</span>
        </a>

        <!-- Séparateur -->
        <div class="pt-3 pb-1">
          <p class="px-3 text-xs font-semibold text-slate-600 uppercase tracking-widest">Agents actifs</p>
        </div>

        <!-- Liste des agents (injectée par app.js) -->
        <ul id="deviceList" class="space-y-1" aria-live="polite"></ul>
        <p id="emptyState" class="px-3 py-4 text-xs text-slate-500 text-center leading-relaxed">
          Aucun appareil suivi.<br/>
          <a href="fleet.html" class="text-sky-400 hover:text-sky-300 font-medium mt-1 inline-block">+ Ajouter un appareil à suivre</a>
        </p>

      </nav>

      <!-- Bas de sidebar : déconnexion -->
      <div class="px-3 pb-5 pt-3 border-t border-navy-700 space-y-2">

        <!-- Notifications badge -->
        <a href="#" id="notifLink"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="bell"></svg>
          <span>Notifications</span>
          <span id="notifBadge"
            class="ml-auto hidden text-xs font-bold px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 border border-red-500/30"></span>
        </a>

        <!-- Déconnexion -->
        <button id="btnSignOut"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
          <svg class="w-4 h-4 flex-shrink-0" data-lucide="log-out"></svg>
          <span>Se déconnecter</span>
        </button>
      </div>
    </aside>

    <!-- ════════════════════════════════════════════
         ZONE CARTE — plein écran
         ════════════════════════════════════════════ -->
    <div class="relative flex-1 min-w-0">

      <!-- Carte Leaflet -->
      <div id="map" class="absolute inset-0 z-0"
        role="application" aria-label="Carte des positions des agents"></div>

      <!-- ── Bouton hamburger (mobile) ── -->
      <button id="sidebarToggle" aria-label="Ouvrir le menu"
        class="absolute top-3 left-3 z-10">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- ── Carte flottante historique (bas gauche) ── -->
      <div class="absolute bottom-6 left-6 z-10 w-64">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-200/80 p-4">

          <div class="flex items-center gap-2 mb-3">
            <svg class="w-4 h-4 text-slate-500" data-lucide="history"></svg>
            <h3 class="text-xs font-semibold text-slate-700 uppercase tracking-wider">Historique</h3>
          </div>

          <label class="block mb-3">
            <span class="text-xs text-slate-500 font-medium block mb-1.5">Agent</span>
            <select id="historyAgent"
              class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent cursor-pointer">
              <option value="">— Sélectionner —</option>
            </select>
          </label>

          <label class="block">
            <span class="text-xs text-slate-500 font-medium block mb-1.5">Date</span>
            <input type="date" id="historyDate"
              class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent" />
          </label>

          <p id="historyTrailMeta"
            class="mt-2.5 text-xs text-slate-500 leading-relaxed min-h-[1rem]"
            aria-live="polite"></p>
        </div>
      </div>

      <!-- ── Bouton centrer la carte ── -->
      <button id="btnCenterMap"
        class="absolute top-4 right-4 z-10 w-10 h-10 bg-white/95 backdrop-blur-sm rounded-xl shadow-lg border border-slate-200/80 flex items-center justify-center text-slate-600 hover:text-sky-500 hover:border-sky-300 transition-all"
        title="Centrer sur les agents">
        <svg class="w-4 h-4" data-lucide="locate"></svg>
      </button>

      <!-- ── Sélecteur de Thème Flottant ── -->
      <div class="theme-switcher-float">
        <button id="btnToggleTheme" class="theme-switcher-btn" title="Changer le thème (Clair / Sombre / AMOLED)">
          🌓
        </button>
      </div>

    </div>
  </div>

  <!-- Barre de navigation basse mobile (iPhone & Android) -->
  <nav class="mobile-nav-bar md:hidden" aria-label="Navigation mobile principale">
    <a href="index.html" class="mobile-nav-item mobile-nav-item--active" data-mobile-nav="carte">
      <span class="mobile-nav-icon">🗺️</span>
      <span>Carte</span>
    </a>
    <a href="fleet.html" class="mobile-nav-item" data-mobile-nav="flotte">
      <span class="mobile-nav-icon">🚗</span>
      <span>Flotte</span>
    </a>
    <a href="rapport.html" class="mobile-nav-item" data-mobile-nav="rapport">
      <span class="mobile-nav-icon">📄</span>
      <span>Rapports</span>
    </a>
    <a href="licence.html" class="mobile-nav-item" data-mobile-nav="licence">
      <span class="mobile-nav-icon">🔑</span>
      <span>Licences</span>
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>

  <script type="module" defer src="./boot-sidebar.js"></script>
  <script type="module" defer src="./boot-dashboard.js"></script>
</body>
</html>

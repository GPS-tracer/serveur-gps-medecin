<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - GPS Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-preview {
            transition: all 0.3s ease;
        }
        .logo-preview:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">GPS Tracker</h1>
            <p class="text-slate-400">Créez votre compte entreprise</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700/50 p-8">
            
            <form id="registerForm" class="space-y-6">
                
                <!-- Logo Upload -->
                <div class="flex flex-col items-center mb-8">
                    <div class="relative group">
                        <div id="logoPreview" class="w-32 h-32 rounded-full bg-slate-700/50 border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden logo-preview cursor-pointer hover:border-sky-500 transition-colors">
                            <svg class="w-12 h-12 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <img id="logoImage" class="hidden w-full h-full object-cover" alt="Logo">
                        </div>
                        <input type="file" id="logoInput" accept="image/*" class="hidden">
                        <label for="logoInput" class="absolute bottom-0 right-0 bg-sky-500 hover:bg-sky-600 text-white rounded-full p-2 cursor-pointer shadow-lg transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </label>
                    </div>
                    <p class="text-slate-400 text-sm mt-3">Logo de votre société</p>
                </div>

                <!-- Nom de la société -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">
                        Nom de la société <span class="text-red-400">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="companyName" 
                        required
                        class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all"
                        placeholder="Ex: Transport Express SARL">
                </div>

                <!-- Secteur d'activité -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">
                        Secteur d'activité <span class="text-red-400">*</span>
                    </label>
                    <select 
                        id="sector" 
                        required
                        class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all appearance-none cursor-pointer">
                        <option value="" class="bg-slate-800">Sélectionnez un secteur</option>
                        <option value="moto" class="bg-slate-800">🏍️ Moto</option>
                        <option value="voiture" class="bg-slate-800">🚗 Voiture</option>
                        <option value="camion" class="bg-slate-800">🚚 Camion</option>
                        <option value="scolaire" class="bg-slate-800">🚌 Scolaire</option>
                    </select>
                </div>

                <!-- Adresse complète -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">
                        Adresse complète <span class="text-red-400">*</span>
                    </label>
                    <textarea 
                        id="address" 
                        required
                        rows="3"
                        class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all resize-none"
                        placeholder="Numéro, rue, ville, code postal, pays"></textarea>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">
                        Email professionnel <span class="text-red-400">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        required
                        class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all"
                        placeholder="contact@entreprise.com">
                </div>

                <!-- Mot de passe -->
                <div>
                    <label class="block text-slate-300 text-sm font-medium mb-2">
                        Mot de passe <span class="text-red-400">*</span>
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            required
                            minlength="6"
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all"
                            placeholder="Minimum 6 caractères">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="text-slate-400 text-xs mt-1">Au moins 6 caractères</p>
                </div>

                <!-- Message d'erreur -->
                <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

                <!-- Bouton Submit -->
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 transform hover:scale-[1.02]">
                    Créer mon compte
                </button>

                <!-- Lien connexion -->
                <p class="text-center text-slate-400 text-sm">
                    Vous avez déjà un compte ? 
                    <a href="login.html" class="text-sky-400 hover:text-sky-300 font-medium transition-colors">Se connecter</a>
                </p>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-500 text-sm mt-6">
            © 2026 GPS Tracker - Tous droits réservés
        </p>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>

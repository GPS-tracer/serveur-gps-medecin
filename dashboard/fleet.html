<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Flotte - GPS Tracker</title>
    <link rel="preload" href="style.css" as="style">
    <link rel="stylesheet" href="style.css">
    <script>
      (function() {
        const theme = localStorage.getItem('gps-tracker-theme') || 'dark';
        document.documentElement.className = 'theme-' + theme;
      })();
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script>window.tailwind={corePlugins:{preflight:true}}</script>
    <script src="https://cdn.tailwindcss.com?plugins=forms" defer></script>
</head>
<body class="app-body" data-nav-active="flotte" data-nav-title="Ma Flotte" data-page-module="./fleet.js">

    <div id="appShellRoot"></div>

    <main class="app-main container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Formulaire d'ajout d'agent -->
            <div class="lg:col-span-1">
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 sticky top-24">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg class="w-6 h-6 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Ajouter un appareil à suivre
                    </h3>

                    <form id="addAgentForm" class="space-y-4">
                        
                        <!-- Nom de l'agent -->
                        <div>
                            <label class="block text-slate-300 text-sm font-medium mb-2">
                                Nom complet <span class="text-red-400">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="agentName" 
                                required
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500"
                                placeholder="Ex: Jean Dupont">
                        </div>

                        <!-- Identifiant unique -->
                        <div>
                            <label class="block text-slate-300 text-sm font-medium mb-2">
                                Identifiant unique <span class="text-red-400">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="agentId" 
                                required
                                pattern="[a-zA-Z0-9_-]+"
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500"
                                placeholder="Ex: agent_001">
                            <p class="text-slate-400 text-xs mt-1">Lettres, chiffres, - et _ uniquement</p>
                        </div>

                        <!-- Type de véhicule -->
                        <div>
                            <label class="block text-slate-300 text-sm font-medium mb-2">
                                Type de véhicule <span class="text-red-400">*</span>
                            </label>
                            <select 
                                id="vehicleType" 
                                required
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-sky-500 cursor-pointer">
                                <option value="">Sélectionnez un type</option>
                                <option value="moto">🏍️ Moto (Livraison/Taxi-moto)</option>
                                <option value="voiture">🚗 Voiture</option>
                                <option value="camion">🚚 Camion</option>
                            </select>
                        </div>

                        <!-- Téléphone (optionnel) -->
                        <div>
                            <label class="block text-slate-300 text-sm font-medium mb-2">
                                Téléphone (optionnel)
                            </label>
                            <input 
                                type="tel" 
                                id="agentPhone"
                                class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-500"
                                placeholder="+243 XXX XXX XXX">
                        </div>

                        <!-- Message d'erreur -->
                        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

                        <!-- Bouton Submit -->
                        <button 
                            type="submit" 
                            id="submitBtn"
                            class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-lg transition-all">
                            Ajouter un appareil à suivre
                        </button>
                    </form>
                </div>
            </div>

            <!-- Liste des agents -->
            <div class="lg:col-span-2">
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
                    
                    <!-- Header -->
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold flex items-center gap-2">
                            <svg class="w-6 h-6 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            Ma Flotte
                        </h3>
                        <span id="agentCount" class="px-3 py-1 bg-sky-500/20 text-sky-400 rounded-full text-sm font-medium">
                            0 agents
                        </span>
                    </div>

                    <!-- État vide -->
                    <div id="emptyState" class="text-center py-12">
                        <svg class="w-16 h-16 text-slate-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <p class="text-slate-400 text-lg mb-2">Aucun appareil suivi</p>
                        <p class="text-slate-500 text-sm">Ajoutez votre premier appareil pour démarrer le suivi</p>
                    </div>

                    <!-- Liste des agents -->
                    <div id="agentsList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de confirmation de suppression -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">Confirmer la suppression</h3>
            <p class="text-slate-300 mb-6">Êtes-vous sûr de vouloir supprimer cet agent ? Cette action est irréversible.</p>
            <div class="flex gap-3">
                <button id="cancelDelete" class="flex-1 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors">
                    Annuler
                </button>
                <button id="confirmDelete" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition-colors">
                    Supprimer
                </button>
            </div>
        </div>
    </div>

    <script type="module" defer src="./boot-app.js"></script>
</body>
</html>
